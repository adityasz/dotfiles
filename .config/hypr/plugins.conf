# hyprlang if DEBUG_CONFIG
# hyprlang if !DISABLE_PLUGIN_WM
exec-once = hyprctl plugin load $HOME/Projects/hyprland/wm/build/debug/libwm.so
# hyprlang endif
# hyprlang if !DISABLE_PLUGIN_HY3
exec-once = hyprctl plugin load $HOME/Projects/hyprland/hy3/build/debug/libhy3.so
# hyprlang endif
# hyprlang endif

# hyprlang if !DEBUG_CONFIG
$plugin_dir = $HOME/.local/lib/hyprland-plugins
# hyprlang if !DISABLE_PLUGIN_WM
exec-once = hyprctl plugin load $plugin_dir/libwm.so
# hyprlang endif
# hyprlang if !DISABLE_PLUGIN_HY3
exec-once = hyprctl plugin load $plugin_dir/libhy3.so
# hyprlang endif
# hyprlang if !DISABLE_PLUGIN_HYPRVIEW
exec-once = hyprctl plugin load $plugin_dir/hyprview.so
# hyprlang endif
# hyprlang endif

plugin {
    hy3 {
        tab_first_window = true
        tabs {
            height       = 0
            padding      = 0
            render_text  = false
            text_height  = 0
            text_padding = 0
            blur         = false
            opacity      = 1
        }
    }
}
