[runtime]
watcher_on_save = "autorun"
std_stream_max_bytes = 1000000
on_cell_change = "autorun"
default_sql_output = "auto"
auto_reload = "autorun"
auto_instantiate = true
output_max_bytes = 8000000
default_auto_download = []
reactive_tests = true

[datasources]

[mcp]
presets = []

[mcp.mcpServers]

[package_management]
manager = "uv"

[server]
browser = "default"
follow_symlink = true

[display]
default_table_max_columns = 50
cell_output = "above"
default_width = "medium"
reference_highlighting = false
dataframes = "rich"
code_editor_font_size = 14
theme = "system"
default_table_page_size = 10

[save]
autosave_delay = 1000
autosave = "off"
format_on_save = false

[language_servers.ty]
enabled = true

[language_servers.basedpyright]

[language_servers.pylsp]
enable_pylint = false
enable_pydocstyle = false
enable_mypy = true
enable_ruff = true
enable_flake8 = false
enable_pyflakes = false
enabled = false

[keymap]
preset = "vim"
destructive_delete = true

[keymap.overrides]

[diagnostics]
sql_linter = true
enabled = false

[ai]
rules = ""
inline_tooltip = false
mode = "manual"

[ai.models]
custom_models = []
displayed_models = []

[ai.google]

[ai.anthropic]

[ai.open_ai]

[ai.bedrock]

[experimental]

[completion]
activate_on_typing = true
copilot = false

[formatting]
line_length = 79

[snippets]
custom_paths = []
include_default_snippets = true
